name: PR

on:
  pull_request:

concurrency:
  group: ${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  whoami:
    name: Test Command
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - id: whoami
        uses: ./
        with:
          commands: |
            oc whoami
            echo "whoami-output-ok" >> "$GITHUB_OUTPUT"
          oc_namespace: ${{ vars.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          oc_version: 4.16
          timeout: 1m
          triggers: ('.github/' 'action.yml')

      - if: steps.whoami.outputs.triggered != 'false'
        run: |
          # Verify outputs
          echo "Outputs: ${{ toJSON(steps.whoami.outputs) }}"
          if [ "${{ steps.whoami.outputs.triggered }}" != "true" ]; then
            echo "Error!  Verify outputs."
            exit 1
          fi
          if [ "${{ steps.whoami.outputs.commands }}" != "whoami-output-ok" ]; then
            echo "Error! Generic commands output did not match expected value."
            exit 1
          fi

  repository:
    name: Test Non-Default Repository
    needs: whoami
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - id: repository
        uses: ./
        with:
          commands: |
            git remote -v
            if ! git config --get remote.origin.url | grep -q "bcgov/quickstart-openshift"; then
              echo "Error! Repository bcgov/quickstart-openshift is not checked out."
              exit 1
            else
              echo "Repository URL: $(git config --get remote.origin.url)"
              echo "Current Branch: $(git branch --show-current)"
            fi
          oc_namespace: ${{ vars.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          repository: bcgov/quickstart-openshift
          ref: ''
          timeout: 1m
          triggers: ('.github/' 'action.yml')

      - if: steps.repository.outputs.triggered != 'false'
        run: |
          # Verify outputs
          echo "Outputs: ${{ toJSON(steps.repository.outputs) }}"
          if [ "${{ steps.repository.outputs.triggered }}" != "true" ]; then
            echo "Error!  Verify outputs."
            exit 1
          fi

  legacy:
    name: Test Legacy Binary
    needs: repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./
        with:
          commands: oc version
          oc_namespace: ${{ vars.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          oc_version: '4.1'
          timeout: 1m
          triggers: ('.github/' 'action.yml')

  cronjob:
    name: Test CronJob
    needs: legacy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7      
      - id: cronjob
        uses: ./
        with:
          commands: oc process -f cronjob/openshift.deploy.yml -p ZONE=${{ github.event.number }} | oc apply -f -
          cronjob: ${{ github.event.repository.name }}-${{ github.event.number }}-cronjob
          cronjob_tail: -1
          oc_namespace: ${{ vars.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}

          timeout: 1m
          triggers: ('.github/' 'action.yml' 'cronjob/' 'scripts/run_cronjob.sh')

      - if: steps.cronjob.outputs.triggered != 'false'
        run: |
          # Verify outputs
          echo "Outputs: ${{ toJSON(steps.cronjob.outputs) }}"
          if [ "${{ steps.cronjob.outputs.job-name }}" == "" ]; then
            echo "Error!  Verify outputs."
            exit 1
          fi

  test-failures:
    name: Test Failure Scenarios
    needs: cronjob
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # 1. Test wrong server (should retry and fail)
      - id: test-wrong-server
        uses: ./
        continue-on-error: true
        with:
          commands: oc whoami
          oc_namespace: ${{ vars.oc_namespace }}
          oc_server: https://api.nonexistent.devops.gov.bc.ca:6443
          oc_token: ${{ secrets.oc_token }}
          login_attempts: 2
          timeout: 1m
          triggers: ('.github/' 'action.yml')

      - name: Verify wrong server outcome
        if: steps.test-wrong-server.outputs.triggered != 'false'
        run: |
          echo "Wrong server step outcome: ${{ steps.test-wrong-server.outcome }}"
          if [ "${{ steps.test-wrong-server.outcome }}" != "failure" ]; then
            echo "Error: Wrong server step did not fail as expected."
            exit 1
          fi

      # 2. Test wrong token (should fail fast)
      - id: test-wrong-token
        uses: ./
        continue-on-error: true
        with:
          commands: oc whoami
          oc_namespace: ${{ vars.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: invalidtokeninvalidtokeninvalidtokeninvalidtoken
          login_attempts: 3
          timeout: 1m
          triggers: ('.github/' 'action.yml')

      - name: Verify wrong token outcome
        if: steps.test-wrong-token.outputs.triggered != 'false'
        run: |
          echo "Wrong token step outcome: ${{ steps.test-wrong-token.outcome }}"
          if [ "${{ steps.test-wrong-token.outcome }}" != "failure" ]; then
            echo "Error: Wrong token step did not fail as expected."
            exit 1
          fi

  # ==========================================================================
  # WARNING: This job acts as the required merge gate for this workflow.
  # If you add a new job to this workflow, you MUST add its ID to the 'needs'
  # array below, otherwise its failure or cancellation will not block the PR!
  # ==========================================================================
  results:
    name: PR Results
    needs: [whoami, repository, legacy, cronjob, test-failures]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Log Job Results Context
        run: |
          echo "=== Upstream Job Statuses ==="
          echo '${{ toJson(needs) }}'

      - name: Evaluate Overall Status
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ Critical Check Failure: At least one required job has failed or was cancelled."
          exit 1

      - name: Success Message
        run: echo "✅ All critical checks passed or were intentionally skipped!"
