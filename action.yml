name: OpenShift CLI (oc) Login and Runner
description: |
  Action for running OpenShift (oc) commands and managing cronjobs.
  Supports conditional execution based on file changes and provides detailed logging.
branding:
  icon: package
  color: blue

inputs:
  ### Required
  oc_namespace:
    description: |
      OpenShift namespace
      Example: abc123-dev, abc123-test, abc123-prod
    required: true
    pattern: "^[a-z0-9]{6}-(dev|test|prod|tools)$"
  oc_server:
    description: |
      OpenShift server URL with port
      Example: https://api.silver.devops.gov.bc.ca:6443
    required: true
    pattern: '^https:\/\/.*:6443$'
  oc_token:
    description: |
      OpenShift access token for authentication
      Should be stored as a GitHub secret
    required: true
    minLength: 32

  ### Typical / recommended
  commands:
    description: |
      Commands to run (generally oc commands)
      Example: oc whoami
  cronjob:
    description: |
      Name of the cronjob to execute and monitor
      Example: nr-repository-name-cronjob-component
  triggers:
    description: |
      Bash array to diff for triggering, omit to always run
      Example: ('./common', './backend/' './frontend/)

  ### Usually a bad idea / not recommended
  cronjob_tail:
    description: |
      Number of cronjob log lines to tail; use -1 for all
      Example: 100, 200, -1
    default: -1
    # pattern accepts -1 or any non-negative integer
    pattern: "^(-1|[0-9]+)$"
  diff_branch:
    description: |
      Branch to diff against
      Example: main, master, SHA or tag
    default: ${{ github.event.repository.default_branch }}
  oc_version:
    description: |
      Override oc version, >= 4.0
      Example: 4.18
    default: "4.18"
    pattern: '^(4\.[0-9]+|latest)$'
  repository:
    description: |
      Optionally, specify a different repo to clone
      Example: bcgov/openshift-quickstart
    default: ""
    pattern: "^[a-zA-Z0-9-_]+/[a-zA-Z0-9-_]+$"
  ref:
    # This should usually be empty unless we're overriding the current branch
    description: |
      The branch, tag or SHA to checkout; omit to use the current branch
      Example: main, master, SHA or tag
    default: ""
  timeout:
    description: |
      Timeout for commands or cronjob
      Example: 10m, 30s, 1h
    default: 10m
    pattern: "^[0-9]+[mhs]$"
  github_token:
    description: Specify token (GH or PAT), instead of inheriting one from the calling workflow
    default: ${{ github.token }}
  verbose:
    description: |
      Enable bash xtrace (`set -x`) for commands input debugging
      Example: true, false
    default: "false"
    pattern: "^(true|false)$"
  login_attempts:
    description: |
      Maximum number of connection retry attempts for logging into OpenShift
      Example: 5, 10
    default: "5"
    pattern: "^[1-9][0-9]*$"

outputs:
  commands:
    description: |
      Generic output channel for data produced by the commands step.
      Typically populated via $GITHUB_OUTPUT in the commands step and may be empty
      if no commands are run or the commands step does not execute.
    value: ${{ steps.commands.outputs.commands }}
  job-name:
    description: Name of the job created from the cronjob param
    value: ${{ steps.cronjob.outputs.job-name }}
  triggered:
    description: Whether the action was triggered
    value: ${{ steps.diff.outputs.triggered }}


runs:
  using: composite
  steps:
    # Send triggers to diff action
    - id: diff
      uses: bcgov/action-diff-triggers@a80e4b3cf77b7e05f84e74030e3bfa08b717a574 # v1.2.1
      with:
        triggers: ${{ inputs.triggers }}
        ref: ${{ inputs.diff_branch }}

    - if: steps.diff.outputs.triggered == 'true'
      env:
        OC: ${{ inputs.oc_version == 'latest' && 'latest' || format('stable-{0}', inputs.oc_version) }}
      shell: bash
      working-directory: /usr/local/bin
      run: |
        # Install CLI Tool and Login
        # Check if oc is already installed
        if ! command -v oc &>/dev/null; then
          URL="https://mirror.openshift.com/pub/openshift-v4/clients/ocp/${OC}/openshift-client-linux.tar.gz"
          echo "Downloading OpenShift CLI from ${URL}..."

          # Download the archive
          if ! wget "${URL}" -qO oc.tar.gz; then
            echo "Error: Failed to download OpenShift CLI"
            exit 1
          fi

          # Extract the oc binary
          if ! tar -xzf oc.tar.gz oc; then
            echo "Error: Failed to extract oc binary"
            rm -f oc.tar.gz
            exit 1
          fi
          rm -f oc.tar.gz
        fi

        # OpenShift login with smart retry
        ATTEMPTS=${{ inputs.login_attempts }}
        DELAY=2
        SERVER_URL="${{ inputs.oc_server }}"
        NAMESPACE="${{ inputs.oc_namespace }}"
        SA_TOKEN_URL="${SERVER_URL}/api/v1/namespaces/${NAMESPACE}/serviceaccounts/pipeline/token"

        attempt=1
        while [ $attempt -le $ATTEMPTS ]; do
          echo "Attempting to acquire token (Attempt $attempt/$ATTEMPTS)..."
          
          # Fetch token response with HTTP code directly to memory
          RESPONSE=$(curl -ksS --connect-timeout 10 --max-time 30 -w "%{http_code}" -X POST "${SA_TOKEN_URL}" \
            --header "Authorization: Bearer ${{ inputs.oc_token }}" \
            --header "Content-Type: application/json; charset=utf-8" \
            --data '{"spec": {"expirationSeconds": 1500 }}' 2>/dev/null) || true

          # Extract HTTP code and response body in memory
          HTTP_CODE="000"
          BODY=""
          if [ ${#RESPONSE} -ge 3 ]; then
            HTTP_CODE="${RESPONSE: -3}"
            BODY="${RESPONSE:0:${#RESPONSE}-3}"
          fi

          # Success path: try to log in
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            TOKEN=$(echo "$BODY" | jq -r '.status.token' 2>/dev/null)
            if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
              echo "Error: Failed to parse token from response."
            elif OC_OUT=$(oc login --server="${SERVER_URL}" --token="${TOKEN}" 2>&1); then
              echo "Login successful!"
              break
            else
              echo "Token acquired, but 'oc login' failed. Error: $OC_OUT"
            fi
          # Timeout / Connection failure path: retry
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "Connection timed out. Retrying..."
          # Rejection / Client error path: fail fast
          else
            echo "::error::API request failed with HTTP $HTTP_CODE. Failing fast."
            echo "Response body: $(echo "$BODY" | sed -E 's/("token"[[:space:]]*:[[:space:]]*")[^"]+/\1***REDACTED***/g')"
            exit 1
          fi

          if [ $attempt -eq $ATTEMPTS ]; then
            echo "::error::Failed to log in to OpenShift after $ATTEMPTS attempts."
            exit 1
          fi

          echo "Login attempt $attempt failed, retrying in $DELAY seconds..."
          sleep $DELAY
          DELAY=$((DELAY * 2))
          attempt=$((attempt + 1))
        done

        # Verify namespace
        if [ "$( oc project -q )" != "${{ inputs.oc_namespace }}" ]; then
          echo "Project and token do not match!"
          exit 1
        fi

        # Version for client, kustomize, server and Kubernetes
        echo -e "\nInput Version: ${{ env.OC }}"
        oc version
        echo

    - if: steps.diff.outputs.triggered == 'true'
      uses: actions/checkout@v6
      with:
        token: ${{ inputs.github_token }}
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}

    - if: steps.diff.outputs.triggered == 'true' && inputs.commands
      id: commands
      shell: bash
      run: |
        set -eEuo pipefail
        ACTION_SOURCE="bcgov/action-oc-runner"

        on_commands_error() {
          exit_code=$?
          set +x
          echo "::error title=${ACTION_SOURCE}: commands input failed::[${ACTION_SOURCE}] commands block failed with exit code ${exit_code}."
          echo "::error::[${ACTION_SOURCE}] If optional grep/pipeline failures are expected, guard them with '|| true' or explicit condition checks."
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### ${ACTION_SOURCE} failure"
              echo
              echo "- Component: commands input"
              echo "- Exit code: ${exit_code}"
              echo "- Hint: if optional grep/pipeline failures are expected, guard with \`|| true\` or explicit condition checks"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$exit_code"
        }

        REAL_GITHUB_OUTPUT="$GITHUB_OUTPUT"
        ACTION_OUTPUT_FILE="$(mktemp)"
        export GITHUB_OUTPUT="$ACTION_OUTPUT_FILE"
        trap 'rm -f "$ACTION_OUTPUT_FILE"' EXIT

        ENABLE_VERBOSE="${{ inputs.verbose }}"

        if [ "$ENABLE_VERBOSE" = "true" ]; then
          echo "::notice::[${ACTION_SOURCE}] Verbose mode enabled for commands step (includes internal output processing)."
          set -x
        fi

        trap on_commands_error ERR

        # Run command(s)
        ${{ inputs.commands }}

        trap - ERR

        # Map user-written output lines to the action's generic commands output.
        # Allows plain `echo "value" >> "$GITHUB_OUTPUT"` without requiring `commands=`.
        if [ -s "$ACTION_OUTPUT_FILE" ]; then
          DELIM="EOF_ACTION_OC_RUNNER_COMMANDS_$(uuidgen 2>/dev/null || cat /proc/sys/kernel/random/uuid 2>/dev/null || echo "${RANDOM}${RANDOM}$$")"
          {
            echo "commands<<$DELIM"
            if grep -q '^commands=' "$ACTION_OUTPUT_FILE"; then
              sed -n 's/^commands=//p' "$ACTION_OUTPUT_FILE"
            elif grep -q '^commands<<' "$ACTION_OUTPUT_FILE"; then
              awk '
                /^commands<</ {
                  split($0, a, "<<")
                  tag = a[2]
                  in_block = 1
                  next
                }
                in_block && $0 == tag {
                  in_block = 0
                  exit
                }
                in_block {
                  print
                }
              ' "$ACTION_OUTPUT_FILE"
            else
              cat "$ACTION_OUTPUT_FILE"
            fi
            echo "$DELIM"
          } >> "$REAL_GITHUB_OUTPUT"
        fi

        if [ "$ENABLE_VERBOSE" = "true" ]; then
          set +x
        fi

    - if: steps.diff.outputs.triggered == 'true' && inputs.commands && inputs.cronjob
      shell: bash
      run: sleep 3

    # Action repo needs to be present for triggered cronjob scripts or cleanup (using override repo)
    - if: steps.diff.outputs.triggered == 'true' || github.repository != inputs.repository
      name: Checkout local repo to make sure action.yml is present
      uses: actions/checkout@v6
      with:
        token: ${{ inputs.github_token }}

    - if: steps.diff.outputs.triggered == 'true' && inputs.cronjob
      id: cronjob
      shell: bash
      run: |
        # Run the cronjob script
        ./scripts/run_cronjob.sh "${{ inputs.cronjob }}" "${{ inputs.timeout }}" "${{ inputs.cronjob_tail }}"
